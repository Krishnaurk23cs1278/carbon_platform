---
- name: Deploy Kubernetes Manifests
  hosts: localhost
  connection: local
  tasks:
    - name: Ensure namespace exists
      kubernetes.core.k8s:
        name: default
        api_version: v1
        kind: Namespace
        state: present

    - name: Create MongoDB Deployment & Service
      kubernetes.core.k8s:
        state: present
        src: ../k8s/db.yaml

    - name: Create Backend Deployment & Service
      kubernetes.core.k8s:
        state: present
        src: ../k8s/backend.yaml

    - name: Create Frontend Deployment & Service
      kubernetes.core.k8s:
        state: present
        src: ../k8s/frontend.yaml

    - name: Create HPA for Services
      kubernetes.core.k8s:
        state: present
        src: ../k8s/hpa.yaml
